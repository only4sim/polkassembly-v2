version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: polkassembly-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV}
        NEXT_PUBLIC_DEFAULT_NETWORK: ${NEXT_PUBLIC_DEFAULT_NETWORK}
        ACCESS_TOKEN_PRIVATE_KEY: ${ACCESS_TOKEN_PRIVATE_KEY}
        ACCESS_TOKEN_PUBLIC_KEY: ${ACCESS_TOKEN_PUBLIC_KEY}
        ACCESS_TOKEN_PASSPHRASE: ${ACCESS_TOKEN_PASSPHRASE}
        REFRESH_TOKEN_PRIVATE_KEY: ${REFRESH_TOKEN_PRIVATE_KEY}
        REFRESH_TOKEN_PUBLIC_KEY: ${REFRESH_TOKEN_PUBLIC_KEY}
        REFRESH_TOKEN_PASSPHRASE: ${REFRESH_TOKEN_PASSPHRASE}
        NOTIFICATION_ENGINE_API_KEY: ${NOTIFICATION_ENGINE_API_KEY}
        SUBSCAN_API_KEY: ${SUBSCAN_API_KEY}
        NEXT_PUBLIC_IMBB_KEY: ${NEXT_PUBLIC_IMBB_KEY}
        NEXT_PUBLIC_POLKASSEMBLY_API_KEY: ${NEXT_PUBLIC_POLKASSEMBLY_API_KEY}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID}
        FIREBASE_SERVICE_ACC_CONFIG: ${FIREBASE_SERVICE_ACC_CONFIG}
        REDIS_URL: redis://redis:6379
        AI_SERVICE_URL: ${AI_SERVICE_URL}
        TOOLS_PASSPHRASE: ${TOOLS_PASSPHRASE}
        IS_CACHE_ENABLED: ${IS_CACHE_ENABLED}
        IS_AI_ENABLED: ${IS_AI_ENABLED}
        IS_NOTIFICATION_SERVICE_ENABLED: ${IS_NOTIFICATION_SERVICE_ENABLED}
        GOOGLE_API_KEY: ${GOOGLE_API_KEY}
        KUSAMA_ASSETHUB_UNIFIED_SQUID_URL: ${KUSAMA_ASSETHUB_UNIFIED_SQUID_URL}
        POLKADOT_ASSETHUB_UNIFIED_SQUID_URL: ${POLKADOT_ASSETHUB_UNIFIED_SQUID_URL}
        NEXT_PUBLIC_ALGOLIA_APP_ID: ${NEXT_PUBLIC_ALGOLIA_APP_ID}
        NEXT_PUBLIC_ALGOLIA_SEARCH_API_KEY: ${NEXT_PUBLIC_ALGOLIA_SEARCH_API_KEY}
        ALGOLIA_WRITE_API_KEY: ${ALGOLIA_WRITE_API_KEY}
    container_name: polkassembly-app
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
